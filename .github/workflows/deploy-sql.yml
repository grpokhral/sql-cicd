name: Deploy SQL Scripts to Azure

on:
  push:
    branches:
      - main   # runs every time you push to main

jobs:
  deploy-sql:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your code
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Install SQLCMD
      - name: Install SQLCMD
        run: |
          sudo apt-get update
          sudo apt-get install -y curl apt-transport-https gnupg

          curl https://packages.microsoft.com/keys/microsoft.asc \
            | sudo apt-key add -

          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list

          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y \
            msodbcsql18 \
            mssql-tools18 \
            unixodbc-dev

          echo "/opt/mssql-tools18/bin" >> $GITHUB_PATH

      # 3. Verify SQLCMD installed correctly
      - name: Verify SQLCMD
        run: sqlcmd -?

      # 4. Run all SQL scripts in order
      - name: Run SQL Scripts
        env:
          AZURE_SQL_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
          AZURE_SQL_DB: ${{ secrets.AZURE_SQL_DB }}
          AZURE_SQL_USER: ${{ secrets.AZURE_SQL_USER }}
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
        run: |
          echo "================================="
          echo " Deploying to Azure SQL Database"
          echo "================================="

          for f in $(ls scripts/*.sql | sort); do
            echo "▶️  Running: $f"

            sqlcmd \
              -S "$AZURE_SQL_SERVER" \
              -d "$AZURE_SQL_DB" \
              -U "$AZURE_SQL_USER" \
              -P "$AZURE_SQL_PASSWORD" \
              -i "$f" \
              -b \
              -C

            if [ $? -ne 0 ]; then
              echo "❌ FAILED on $f — stopping."
              exit 1
            fi
            echo "✅ Done: $f"
          done

          echo "================================="
          echo "🎉 All scripts deployed!"
          echo "================================="